<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- warm paper ground -->
  <rect width="64" height="64" rx="6" fill="#fbf9f4"/>
  <!-- thin almanac border -->
  <rect x="2" y="2" width="60" height="60" rx="4" fill="none" stroke="#d4cfc4" stroke-width="1"/>
  <!-- serif italic A in civic red — editorial monogram -->
  <text x="32" y="46" text-anchor="middle"
        font-family="'Times New Roman', Georgia, serif"
        font-style="italic"
        font-weight="700"
        font-size="44"
        fill="#8b3a1f">A</text>
  <!-- masthead-echo double rule -->
  <line x1="12" y1="54" x2="52" y2="54" stroke="#1a1815" stroke-width="1.5"/>
  <line x1="12" y1="57" x2="52" y2="57" stroke="#1a1815" stroke-width="0.6"/>
</svg>
